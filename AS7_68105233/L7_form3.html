<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>68105233 Assignment 7</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style3.css">

  <style>
    /* ทำ Video เป็น Banner */
    .banner {
      position: relative;
      height: 60vh;
      overflow: hidden;
    }

    .banner video {
      position: absolute;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      transform: translate(-50%, -50%);
      object-fit: cover;
    }

    .banner-content {
      position: relative;
      z-index: 2;
      text-align: center;
      color: white;
      padding-top: 150px;
    }

    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.4);
      z-index: 1;
    }

    form {
      max-width: 500px;
      margin: 40px auto;
    }
  </style>
</head>
<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
  const video = document.getElementById("myVideo");

  function playVideo() {
    video.play();
  }

  function pauseVideo() {
    video.pause();
  }
</script>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">Napattharapong Hongwilai</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link active" href="#">หน้าแรก</a></li>
        <li class="nav-item"><a class="nav-link" href="#">ข้อมูลบริษัท</a></li>
        <li class="nav-item"><a class="nav-link" href="#">บริการ</a></li>
        <li class="nav-item"><a class="nav-link" href="#">เกี่ยวกับเรา</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Video Banner -->
<section class="banner">
  <div class="overlay"></div>

  <video id="myVideo" autoplay loop muted>
    <source src="/Video/204006-923133925_small.mp4" type="video/mp4">
  </video>

  <div class="banner-content">
    <h1 class="fw-bold">Napattharapong Hongwilai</h1>

    <div class="mt-3">
      <button class="btn btn-warning me-2" onclick="playVideo()">Play</button>
      <button class="btn btn-danger" onclick="pauseVideo()">Pause</button>
    </div>
  </div>
</section>

<!-- Form Section -->
<div class="container">
  <form class="card shadow p-4">
    <h3 class="text-center mb-4">แบบฟอร์มลงทะเบียน</h3>

    <div class="mb-3">
      <label class="form-label">ชื่อ-นามสกุล</label>
      <input type="text" class="form-control" placeholder="กรุณากรอกชื่อ-นามสกุล" required>
    </div>

    <div class="mb-3">
      <label class="form-label">อีเมล</label>
      <input type="email" class="form-control" placeholder="example@domain.com" required>
    </div>

    <div class="mb-3">
      <label class="form-label">รหัสผ่าน</label>
      <input type="password" class="form-control" required>
    </div>

    <div class="mb-3">
      <label class="form-label d-block">เพศ</label>
      <div class="form-check form-check-inline">
        <input class="form-check-input" type="radio" name="gender">
        <label class="form-check-label">ชาย</label>
      </div>
      <div class="form-check form-check-inline">
        <input class="form-check-input" type="radio" name="gender">
        <label class="form-check-label">หญิง</label>
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">ตำแหน่ง</label>
      <select class="form-select" required>
        <option selected disabled>กรุณาเลือกตำแหน่ง</option>
        <option>Web Developer</option>
        <option>Designer</option>
        <option>Project Manager</option>
        <option>Tester</option>
        <option>UX/UI Designer</option>
      </select>
    </div>

    <div class="text-center">
      <button type="submit" class="btn btn-primary me-2">ลงทะเบียน</button>
      <button type="reset" class="btn btn-secondary">ล้างข้อมูล</button>
    </div>
  </form>
</div>
</body>
</html>
